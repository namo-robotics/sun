<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Scope Tree</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --border-color: #444;
            --scope-global: #264f36;
            --scope-module: #3d3d6b;
            --scope-import: #4a4a4a;
            --scope-function: #6b3d3d;
            --scope-class: #6b5a3d;
            --scope-block: #3d5a6b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            color: #569cd6;
        }

        .scope {
            margin-left: 20px;
            border-left: 2px solid var(--border-color);
            padding-left: 12px;
            margin-top: 4px;
        }

        .scope-header {
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 4px;
            margin: 2px 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            transition: filter 0.15s;
        }

        .scope-header:hover {
            filter: brightness(1.2);
        }

        .scope-header::before {
            content: '▶';
            font-size: 10px;
            transition: transform 0.15s;
        }

        .scope.expanded>.scope-header::before {
            transform: rotate(90deg);
        }

        .scope-global .scope-header {
            background: var(--scope-global);
        }

        .scope-module .scope-header {
            background: var(--scope-module);
        }

        .scope-import .scope-header {
            background: var(--scope-import);
        }

        .scope-function .scope-header {
            background: var(--scope-function);
        }

        .scope-class .scope-header {
            background: var(--scope-class);
        }

        .scope-block .scope-header {
            background: var(--scope-block);
        }

        .scope-content {
            display: none;
            margin-top: 8px;
        }

        .scope.expanded>.scope-content {
            display: block;
        }

        .details {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 10px 14px;
            margin: 8px 0;
            font-size: 12px;
        }

        .details-section {
            margin-bottom: 10px;
        }

        .details-section:last-child {
            margin-bottom: 0;
        }

        .details-title {
            color: #569cd6;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .detail-row {
            display: flex;
            gap: 10px;
            padding: 2px 0;
        }

        .detail-name {
            color: #9cdcfe;
        }

        .detail-type {
            color: #4ec9b0;
        }

        .detail-meta {
            color: #9e9e9e;
            font-style: italic;
        }

        .scope-qualified {
            color: #ffffff;
            margin-left: 8px;
        }

        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            margin-left: 6px;
        }

        .badge-throws {
            background: #6b3d3d;
        }

        .badge-unsafe {
            background: #8b4513;
        }

        .badge-external {
            background: #4a4a6a;
        }

        .children-container {
            margin-top: 4px;
        }

        .empty {
            color: #666;
            font-style: italic;
        }

        .toggle-all {
            background: #333;
            border: 1px solid #555;
            color: #d4d4d4;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .toggle-all:hover {
            background: #444;
        }
    </style>
</head>

<body>
    <h1>Semantic Scope Tree</h1>
    <button class="toggle-all" onclick="toggleAll()">Expand All</button>
    <div id="tree"></div>

    <script>
        const scopeData = /* SCOPE_JSON_DATA */;

        function renderScope(scope, container, depth = 0) {
            const div = document.createElement('div');
            div.className = `scope scope-${scope.type.toLowerCase()}`;
            if (depth === 0) div.classList.add('expanded');

            // Header
            const header = document.createElement('div');
            header.className = 'scope-header';

            // Build title showing all scope identification fields
            const parts = [`type=${scope.type}`];
            if (scope.scopeName) parts.push(`scopeName=${escapeHtml(scope.scopeName)}`);
            if (scope.scopeKey) parts.push(`scopeKey=${escapeHtml(scope.scopeKey)}`);
            if (scope.functionSignature) parts.push(`signature=${escapeHtml(scope.functionSignature)}`);
            header.innerHTML = parts.join(', ');

            // Badges
            if (scope.canThrow) header.innerHTML += '<span class="badge badge-throws">throws</span>';
            if (scope.unsafe) header.innerHTML += '<span class="badge badge-unsafe">unsafe</span>';
            if (scope.external) header.innerHTML += '<span class="badge badge-external">external</span>';

            header.onclick = (e) => {
                e.stopPropagation();
                div.classList.toggle('expanded');
            };

            const content = document.createElement('div');
            content.className = 'scope-content';

            // Details panel
            const details = document.createElement('div');
            details.className = 'details';
            details.innerHTML = renderDetails(scope);
            if (details.innerHTML.trim()) content.appendChild(details);

            // Children container
            const childrenContainer = document.createElement('div');
            childrenContainer.className = 'children-container';

            // Render child modules
            if (scope.childModules) {
                for (const [name, child] of Object.entries(scope.childModules)) {
                    renderScope(child, childrenContainer, depth + 1);
                }
            }

            // Render other children
            if (scope.children) {
                for (const child of scope.children) {
                    renderScope(child, childrenContainer, depth + 1);
                }
            }

            if (childrenContainer.children.length > 0) {
                content.appendChild(childrenContainer);
            }

            div.appendChild(header);
            div.appendChild(content);
            container.appendChild(div);
        }

        function renderDetails(scope) {
            let html = '';

            // Variables
            if (scope.variables && Object.keys(scope.variables).length > 0) {
                html += '<div class="details-section"><div class="details-title">Variables</div>';
                for (const [name, info] of Object.entries(scope.variables)) {
                    const meta = [];
                    if (info.isGlobal) meta.push('global');
                    if (info.isParam) meta.push('param');
                    html += `<div class="detail-row">
            <span class="detail-name">${escapeHtml(name)}</span>
            <span class="detail-type">${escapeHtml(info.type)}</span>
            ${meta.length ? `<span class="detail-meta">(${meta.join(', ')})</span>` : ''}
          </div>`;
                }
                html += '</div>';
            }

            // Namespaced variables
            if (scope.namespacedVariables && Object.keys(scope.namespacedVariables).length > 0) {
                html += '<div class="details-section"><div class="details-title">Namespaced Variables</div>';
                for (const [name, info] of Object.entries(scope.namespacedVariables)) {
                    html += `<div class="detail-row">
            <span class="detail-name">${escapeHtml(name)}</span>
            <span class="detail-type">${escapeHtml(info.type)}</span>
          </div>`;
                }
                html += '</div>';
            }

            // Type parameters
            if (scope.typeParameters && Object.keys(scope.typeParameters).length > 0) {
                html += '<div class="details-section"><div class="details-title">Type Parameters</div>';
                for (const [name, type] of Object.entries(scope.typeParameters)) {
                    html += `<div class="detail-row">
            <span class="detail-name">${escapeHtml(name)}</span>
            <span class="detail-type">= ${escapeHtml(type)}</span>
          </div>`;
                }
                html += '</div>';
            }

            // Type aliases
            if (scope.typeAliases && Object.keys(scope.typeAliases).length > 0) {
                html += '<div class="details-section"><div class="details-title">Type Aliases</div>';
                for (const [name, type] of Object.entries(scope.typeAliases)) {
                    html += `<div class="detail-row">
            <span class="detail-name">${escapeHtml(name)}</span>
            <span class="detail-type">= ${escapeHtml(type)}</span>
          </div>`;
                }
                html += '</div>';
            }

            return html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        let allExpanded = false;
        function toggleAll() {
            allExpanded = !allExpanded;
            const scopes = document.querySelectorAll('.scope');
            scopes.forEach(s => {
                if (allExpanded) s.classList.add('expanded');
                else s.classList.remove('expanded');
            });
            // Keep root expanded
            const root = document.querySelector('#tree > .scope');
            if (root) root.classList.add('expanded');
            document.querySelector('.toggle-all').textContent = allExpanded ? 'Collapse All' : 'Expand All';
        }

        // Render the tree
        renderScope(scopeData, document.getElementById('tree'));
    </script>
</body>

</html>
